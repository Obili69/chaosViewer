services:
  chaosviewer:
    build:
      context: .
      dockerfile: Dockerfile
    image: chaosviewer:latest
    container_name: chaosviewer
    restart: unless-stopped
    ports:
      - "3039:3039"
    environment:
      DATABASE_URL: "file:/app/data/chaosviewer.db"
      UPLOAD_DIR: "/app/uploads"
      MAX_FILE_SIZE: "52428800"
      JWT_SECRET: "${JWT_SECRET}"
      # Set these only on first start to create the initial admin account.
      # Remove them afterwards — the account persists in the database.
      ADMIN_USERNAME: "${ADMIN_USERNAME:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads

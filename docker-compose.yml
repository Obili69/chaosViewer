services:
  chaosviewer:
    build:
      context: .
      dockerfile: Dockerfile
    image: chaosviewer:latest
    container_name: chaosviewer
    restart: unless-stopped
    ports:
      - "3039:3039"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "file:/app/data/chaosviewer.db"
      UPLOAD_DIR: "/app/uploads"
      MAX_FILE_SIZE: "52428800"
      JWT_SECRET: "${JWT_SECRET}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET}"
      # Set these only on first start to create the initial admin account.
      # Remove them afterwards — the account persists in the database.
      ADMIN_USERNAME: "${ADMIN_USERNAME:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      # Backup to NAS recommended (see scripts/backup.sh)
      NAS_HOST: "${NAS_HOST:-}"
      NAS_USER: "${NAS_USER:-backup-chaosviewer}"
      NAS_PATH: "${NAS_PATH:-/mnt/DATA/chaosviewer}"
      SSH_KEY: "/root/.ssh/chaosviewer_backup"
      DB_PATH: "/app/data/chaosviewer.db"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ${SSH_KEY:-/root/.ssh/chaosviewer_backup}:/root/.ssh/chaosviewer_backup:ro
      - ./.git:/app/.git
